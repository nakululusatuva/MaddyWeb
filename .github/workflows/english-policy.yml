name: English Policy

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  history:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.14"
      - name: Check all reachable history and tracked text
        run: python scripts/check-english-policy.py --repository . --ref "$GITHUB_SHA"
