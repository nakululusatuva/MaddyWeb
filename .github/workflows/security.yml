name: Security gates

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "23 3 * * 1"

permissions:
  contents: read

jobs:
  python-security:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.14"
      - name: Install pinned audit tools and test runtime
        run: |
          python -m pip install --disable-pip-version-check \
            'pip-audit==2.10.1' 'bandit==1.9.4' -e '.[test]'
      - name: Audit hash-locked production dependencies
        run: python -m pip_audit -r requirements.lock --no-deps --disable-pip
      - name: Reject high-severity Python findings
        run: python -m bandit -q -lll -r src scripts
      - name: Run extended deterministic parser fuzzing
        env:
          MADDYWEB_FUZZ_CASES: "20000"
        run: python -m pytest -q tests/fuzz/test_parser_fuzz.py

  trivy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      # This SHA is the post-incident immutable 0.35.0 action.  Keep both the
      # action SHA and the Trivy binary version explicit.
      - name: Scan repository, lockfile, secrets, and configuration
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          version: v0.72.0
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: "false"
          exit-code: "1"
          format: table
      - name: Read locked Maddy 0.9.5 image
        id: maddy-image
        if: ${{ always() }}
        shell: bash
        run: |
          image=$(jq -er '.images["0.9.5"]' tests/integration/maddy-image-lock.json)
          if [[ ! "$image" =~ ^ghcr\.io/foxcpp/maddy@sha256:[0-9a-f]{64}$ ]]; then
            echo 'The locked Maddy 0.9.5 image reference is invalid.' >&2
            exit 1
          fi
          printf 'image=%s\n' "$image" >> "$GITHUB_OUTPUT"
      - name: Scan the exact Maddy 0.9.5 reference image (informational)
        id: maddy-scan
        if: ${{ always() && steps.maddy-image.outcome == 'success' }}
        continue-on-error: true
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          version: v0.72.0
          skip-setup-trivy: "true"
          scan-type: image
          image-ref: ${{ steps.maddy-image.outputs.image }}
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: "false"
          # Maddy is an independently maintained upstream service.  Preserve
          # its exact-digest report without making upstream findings a gate on
          # the MaddyWeb release.  Repository/Web findings above remain fatal.
          exit-code: "0"
          format: table
      - name: Summarize informational Maddy image scan
        if: ${{ always() }}
        shell: bash
        env:
          MADDY_IMAGE: ${{ steps.maddy-image.outputs.image }}
          MADDY_SCAN_OUTCOME: ${{ steps.maddy-scan.outcome }}
        run: |
          {
            echo '## Informational Maddy image scan'
            echo
            echo "- Image: \`${MADDY_IMAGE:-unavailable}\`"
            echo "- Scanner outcome: \`${MADDY_SCAN_OUTCOME:-not-run}\`"
            echo '- Upstream Maddy findings are recorded but do not gate the MaddyWeb release.'
            echo '- Repository, Python dependency, source, secret, configuration, and parser security checks remain blocking.'
          } >> "$GITHUB_STEP_SUMMARY"
          if [[ "${MADDY_SCAN_OUTCOME:-}" != success ]]; then
            echo '::warning::The informational upstream Maddy image scan did not complete; inspect the action log.'
          fi
