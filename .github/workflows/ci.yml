name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: CPython 3.14
            python: "3.14"
            python_args: ""
            build: standard
            gil: enabled
          - name: CPython 3.14t with GIL
            python: "3.14t"
            python_args: "-X gil=1"
            build: free-threaded
            gil: enabled
          - name: CPython 3.14t default
            python: "3.14t"
            python_args: ""
            build: free-threaded
            gil: disabled
          - name: CPython 3.14t explicit no-GIL
            python: "3.14t"
            python_args: "-X gil=0"
            build: free-threaded
            gil: disabled
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install package and test dependencies
        env:
          PYTHON_ARGS: ${{ matrix.python_args }}
        run: |
          read -r -a args <<< "$PYTHON_ARGS"
          python "${args[@]}" -m pip install --disable-pip-version-check -e '.[test]'
      - name: Verify interpreter and extension wheel ABI
        env:
          PYTHON_ARGS: ${{ matrix.python_args }}
        run: |
          read -r -a args <<< "$PYTHON_ARGS"
          python "${args[@]}" scripts/check-python314t.py \
            --expect-build '${{ matrix.build }}' \
            --expect-gil '${{ matrix.gil }}' \
            --import maddyweb.cli \
            --import maddyweb.web \
            --import maddyweb.helper \
            --import maddyweb.docker_certificates \
            --import aiohttp --import nh3
      - name: Run tests
        env:
          PYTHON_ARGS: ${{ matrix.python_args }}
        run: |
          read -r -a args <<< "$PYTHON_ARGS"
          python "${args[@]}" -m pytest -q

  operations:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.14"
      - run: python -m pip install --disable-pip-version-check -e '.[test]'
      - name: Validate shell and deployment contracts
        run: bash tests/integration/test-shell-scripts.sh
      - name: Run deployment integration tests
        run: python -m pytest -q tests/integration/test_deployment_contracts.py
      - name: Compile operational Python scripts
        run: python -m py_compile scripts/*.py tests/integration/*.py
