auth.pass_table local_authdb {
    table sql_table {
        driver sqlite3
        dsn credentials.db
        table_name passwords
    }
}

storage.imapsql local_mailboxes {
    driver sqlite3
    dsn imapsql.db
}

hostname mx.example.invalid

# Real-auth loopback Submission verifies Docker's fixed
# `docker exec -i ... /usr/bin/nc 127.0.0.1 1587` transport. No port is
# published and the internal fixture network has no public egress.
submission tcp://127.0.0.1:1587 {
    limits {
        all concurrency 2
    }

    tls off
    auth &local_authdb

    source example.invalid {
        check {
            authorize_sender {
                user_to_email identity
            }
        }
        destination example.invalid {
            deliver_to &local_mailboxes
        }
        default_destination {
            reject 550 5.1.1 "Fixture permits only local delivery"
        }
    }
    default_source {
        reject 501 5.1.8 "Fixture permits only authenticated local senders"
    }
}

# An isolated lifetime endpoint keeps `maddy run` active. It is bound only
# inside the un-published fixture container and cannot send public mail.
imap tcp://127.0.0.1:1143 {
    tls off
    auth &local_authdb
    storage &local_mailboxes
}
